<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamQuiz AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              primary: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              },
              // TOEFL Theme Colors
              blue: {
                soft: '#eff6ff', // blue-50
                primary: '#2563eb', // blue-600
                dark: '#1e40af', // blue-800
              },
              orange: {
                soft: '#fff7ed', // orange-50
                main: '#f97316', // orange-500
              },
              bg: {
                card: '#f8fafc', // slate-50
                main: '#ffffff',
              },
              border: {
                light: '#e2e8f0', // slate-200
              },
              text: {
                primary: '#334155', // slate-700
                secondary: '#64748b', // slate-500
              }
            },
            animation: {
              'blink': 'blink 1s step-end infinite',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            },
            keyframes: {
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #f1f5f9;
        color: #334155;
      }
    </style>
  <script type="importmap">

  }
}
</script>
